<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRMS - Main Portal</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1f2937;
    }
    .container {
      background-color: white;
      padding: 3rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    h1 {
      margin-top: 0;
      color: #111827;
      font-size: 1.8rem;
    }
    p {
      color: #4b5563;
      margin-bottom: 2rem;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.2s;
      box-sizing: border-box;
    }
    .btn-admin {
      background-color: #4f46e5;
      color: white;
      border: 2px solid #4f46e5;
    }
    .btn-admin:hover {
      background-color: #4338ca;
    }
    .btn-face {
      background-color: #10b981;
      color: white;
      border: 2px solid #10b981;
    }
    .btn-face:hover {
      background-color: #059669;
    }
    .icon {
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>HRMS Portal</h1>
    <p>Please select the application you want to access.</p>
    
    <a href="/admin/" class="btn btn-admin">
      <span class="icon">🔐</span> Admin Panel
    </a>
    
    <a href="/face/" class="btn btn-face">
      <span class="icon">📷</span> Face Scan Attendance
    </a>
  </div>
</body>
</html>
